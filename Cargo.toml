[package]
name = "quivrs"
version = "0.1.1"
edition = "2024"

[dependencies]
dioxus = { version = "0.7.9", features = ["fullstack"] }
dioxus-free-icons = { version = "0.10.0", features = ["font-awesome-solid"] }

tracing = "0.1.44"
anyhow = "1.0.102"
serde = { version = "1.0.228", features = ["derive"] }
tap = "1.0.1"
uuid = { version = "1", features = ["v4", "serde", "js"] }
schemars = "1.2.1"
chrono = { version = "0.4.44", default-features = false, features = [
    "clock",
    "serde",
] }
itertools = "0.14.0"
strum = { version = "0.28.0", features = ["derive"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "=0.2.118"
web-sys = { version = "=0.3.95", features = [
    "Window",
    "Navigator",
    "Clipboard",
    "Document",
    "Element",
    "HtmlElement",
    "DomRect",
] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
dotenvy = "0.15.7"
serde_json = "1.0.149"
ron = "0.12.1"
roxmltree = "0.21.1"
postcard = { version = "1.1.3", default-features = false, features = ["alloc"] }
reqwest = { version = "0.13.3", default-features = false, features = [
    "default-tls",
    "json",
    "brotli",
] }
url-normalize = "0.1.1"
tokio = { version = "1.52.3", features = ["fs", "rt-multi-thread"] }
axum = { version = "0.8.9", default-features = false, features = [
    "tokio",
    "tracing",
    "http1",
] }
tower-http = { version = "0.6.11", features = [
    "fs",
    "async-compression",
    "compression-deflate",
    "compression-gzip",
] }
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio", "uuid", "derive"] }
rs-trafilatura = "0.2.2"
futures = "0.3.32"
fastembed = "5.13.4"

[features]
default = []
server = ["dioxus/server"]
web = ["dioxus/web"]

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
too-many-lines = "allow"
cast-possible-wrap = "allow"
cast-possible-truncation = "allow"
significant_drop_tightening = "allow"
type_complexity = "allow"

[profile.release]
lto = true
codegen-units = 1
strip = true
opt-level = 3
panic = "abort"
